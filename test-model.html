<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bee Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1a; }
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Google's model-viewer web component to easily display GLB files -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    
    <model-viewer 
        src="assets/Hitem3d-1781946782368.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        exposure="1.5"
        environment-image="legacy"
        alt="A 3D model of a Bee">
    </model-viewer>
</body>
</html>
